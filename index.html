<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHAN SAAB Coin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#020617,#020617,#000);
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  align-items:center;
}

/* MENU BUTTON */
.menu-btn {
  font-size:26px;
  cursor:pointer;
  z-index:1001;
}

/* SLIDE MENU */
.side-menu {
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:rgba(17,24,39,0.95);
  backdrop-filter:blur(10px);
  transition:0.4s;
  padding-top:80px;
  z-index:1000;
}

.side-menu a {
  display:block;
  padding:15px 25px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid #1f2937;
}

.side-menu a:hover {
  background:#22c55e;
}

/* WALLET BUTTON */
.wallet-btn {
  background:#111827;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  border:1px solid #22c55e;
}

.wallet-btn:hover {
  box-shadow:0 0 10px #22c55e;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

.hero img {
  width:180px;
  animation:float 3s infinite;
}

@keyframes float {
  50% {transform:translateY(-10px);}
}

.highlight {
  color:#22c55e;
  font-weight:bold;
  font-size:20px;
}

/* BUTTONS */
.btn {
  padding:12px 22px;
  margin:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.green {
  background:#22c55e;
}

.dark {
  background:#111827;
  color:#a855f7;
}

.btn:hover {
  box-shadow:0 0 15px #22c55e;
}

/* SECTIONS */
.section {
  padding:60px 20px;
  text-align:center;
  max-width:900px;
  margin:auto;
}

.section p {
  color:#9ca3af;
  margin:8px 0;
}

/* SOCIAL */
.social-icons a {
  margin:10px;
  font-size:22px;
  color:#9ca3af;
}

.social-icons a:hover {
  color:#22c55e;
}

/* FOOTER */
footer {
  padding:40px;
  text-align:center;
  border-top:1px solid #1f2937;
  color:#6b7280;
}

</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="wallet-btn" onclick="connectWallet()">Connect Wallet</div>
</header>

<!-- SIDE MENU -->
<div id="menu" class="side-menu">
  <a href="#">Home</a>
  <a href="#">Vision</a>
  <a href="#">Tokenomics</a>
  <a href="#">Roadmap</a>
  <a href="#">FAQs</a>
</div>

<!-- HERO -->
<section class="hero">
  <h1>KHAN SAAB Coin</h1>
  <img src="coin.png">
  <p>A Public-First Cryptocurrency</p>
  <p class="highlight">1 Rupee = 1 Coin</p>
  <p>Built for the people, not for whales.</p>

  <button class="btn green">Launch Coming Soon</button><br>

  <a href="https://t.me/khansaabcoin">
    <button class="btn dark">Join Community</button>
  </a>
</section>

<!-- JS -->
<script>

/* MENU TOGGLE */
function toggleMenu() {
  let menu = document.getElementById("menu");
  if(menu.style.right === "0px"){
    menu.style.right = "-260px";
  } else {
    menu.style.right = "0px";
  }
}

/* WALLET CONNECT */
async function connectWallet() {
  if (typeof window.ethereum !== 'undefined') {
    try {
      const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
      alert("Connected: " + accounts[0]);
    } catch (error) {
      alert("Connection Failed");
    }
  } else {
    alert("MetaMask not installed");
  }
}

</script>

</body>
  </html>
